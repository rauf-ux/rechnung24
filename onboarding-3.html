<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo &amp; Bankdaten — Rechnung24</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #FAFAFA; color: #0A0A0B; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    .top-bar { padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: #0A0A0B; border-radius: 8px; color: white; text-align: center; line-height: 28px; font-weight: 700; font-size: 14px; }
    .top-right { display: flex; align-items: center; gap: 16px; }
    .skip { font-size: 13px; color: #A3A3A3; }
    .skip:hover { color: #525252; }
    .step-counter { font-size: 13px; color: #737373; font-weight: 500; }

    .progress { padding: 0 32px; display: flex; gap: 6px; }
    .dot { flex: 1; height: 4px; background: #E5E5E5; border-radius: 2px; }
    .dot.active { background: #0A0A0B; }

    .main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 48px 24px 120px; }
    .card { width: 100%; max-width: 480px; }

    .header { margin-bottom: 32px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #737373; line-height: 1.6; }

    .field { margin-bottom: 18px; }
    .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .label { font-size: 13px; color: #525252; font-weight: 500; }
    .label-optional { font-size: 12px; color: #A3A3A3; }
    .input { width: 100%; height: 44px; background: white; border: 1px solid #E5E5E5; border-radius: 10px; padding: 0 14px; font-size: 14px; color: #0A0A0B; font-family: inherit; transition: all 0.15s; }
    .input:focus { outline: none; border-color: #0A0A0B; border-width: 1.5px; }
    .input::placeholder { color: #A3A3A3; }
    .helper { font-size: 12px; color: #737373; margin-top: 6px; line-height: 1.5; }

    /* Logo upload */
    .upload { background: white; border: 1px dashed #C7C7C7; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .upload:hover { border-color: #0A0A0B; }
    .upload-icon { width: 40px; height: 40px; background: #FAFAFA; border-radius: 10px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .upload-text { font-size: 13px; color: #525252; font-weight: 500; margin-bottom: 4px; }
    .upload-hint { font-size: 11px; color: #A3A3A3; }

    /* Detected hint */
    .detected { font-size: 12px; color: #16A34A; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E5E5E5; padding: 16px 24px; display: flex; justify-content: center; }
    .bottom-bar-inner { width: 100%; max-width: 480px; display: flex; gap: 8px; }
    .btn-back { width: 48px; height: 48px; background: white; border: 1px solid #E5E5E5; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #0A0A0B; font-size: 18px; }
    .btn-next { flex: 1; height: 48px; background: #0A0A0B; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; }

    @media (max-width: 480px) {
      .top-bar { padding: 20px 24px; }
      .progress { padding: 0 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="logo">
      <span class="logo-icon">R</span>
      Rechnung24
    </a>
    <div class="top-right">
      <a href="/done.html" class="skip">Überspringen</a>
      <div class="step-counter">3 / 3</div>
    </div>
  </div>

  <div class="progress">
    <div class="dot active"></div>
    <div class="dot active"></div>
    <div class="dot active"></div>
  </div>

  <main class="main">
    <div class="card">

      <div class="header">
        <h1>Logo &amp; Bankdaten</h1>
        <p class="subtitle">Macht deine Rechnungen professionell. Beides ist optional.</p>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label">Logo</label>
          <span class="label-optional">optional</span>
        </div>
        <div class="upload">
          <div class="upload-icon">📤</div>
          <div class="upload-text">Logo hochladen</div>
          <div class="upload-hint">PNG, JPG oder SVG · Max 2 MB</div>
        </div>
      </div>

      <div class="field">
        <label class="label" for="iban" style="display:block; margin-bottom:6px;">IBAN</label>
        <input type="text" id="iban" class="input" placeholder="DE89 3704 0044 0532 0130 00">
        <p class="helper">Wird auf deinen Rechnungen für Zahlungen angezeigt.</p>
      </div>

    </div>
  </main>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <a href="/onboarding-2.html" class="btn-back">←</a>
      <a href="/done.html" class="btn-next">Fertig</a>
    </div>
  </div>

</body>
</html>
