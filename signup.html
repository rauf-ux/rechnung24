<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0e">
  <title>Registrieren — Klarbill</title>
  <meta name="description" content="Erstelle dein kostenloses Klarbill-Konto. 14 Tage testen, keine Kreditkarte erforderlich.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #FAFAFA; color: #0A0A0B; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* Top bar - minimal */
    .top-bar { padding: 24px 32px; }
    .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: #0A0A0B; border-radius: 8px; color: white; text-align: center; line-height: 28px; font-weight: 700; font-size: 14px; }

    /* Main content - centered */
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 440px; }

    /* Card header */
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .auth-header p { font-size: 14px; color: #737373; }

    /* Card body */
    .auth-form { background: white; border: 1px solid #E5E5E5; border-radius: 16px; padding: 32px; }

    /* Social buttons */
    .social-btn { width: 100%; height: 44px; background: white; border: 1px solid #E5E5E5; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; color: #0A0A0B; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
    .social-btn:hover { border-color: #0A0A0B; }
    .social-btn .icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #A3A3A3; font-size: 12px; font-weight: 500; }
    .divider:before, .divider:after { content: ''; flex: 1; height: 1px; background: #E5E5E5; }

    /* Form */
    .field { margin-bottom: 16px; }
    .label { display: block; font-size: 13px; color: #525252; font-weight: 500; margin-bottom: 6px; }
    .input { width: 100%; height: 44px; background: white; border: 1px solid #E5E5E5; border-radius: 10px; padding: 0 14px; font-size: 14px; color: #0A0A0B; font-family: inherit; transition: all 0.15s; }
    .input:focus { outline: none; border-color: #0A0A0B; border-width: 1.5px; }
    .input::placeholder { color: #A3A3A3; }
    .helper { font-size: 12px; color: #737373; margin-top: 6px; }

    /* Password requirements */
    .pw-hint { font-size: 12px; color: #737373; margin-top: 8px; line-height: 1.5; }

    /* Checkbox */
    .checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; }
    .checkbox-row input { margin-top: 3px; cursor: pointer; }
    .checkbox-row label { font-size: 13px; color: #525252; line-height: 1.5; cursor: pointer; }
    .checkbox-row a { color: #0A0A0B; text-decoration: underline; text-decoration-color: #C7C7C7; }

    /* Submit */
    .submit-btn { width: 100%; height: 48px; background: #0A0A0B; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .submit-btn:hover { background: #262626; }

    /* Footer link */
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #737373; }
    .auth-footer a { color: #0A0A0B; font-weight: 500; }

    /* Trust badges */
    .trust { text-align: center; margin-top: 32px; font-size: 12px; color: #A3A3A3; line-height: 1.6; }
    .trust-row { display: flex; justify-content: center; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 4px; }

    /* Mobile */
    @media (max-width: 480px) {
      .top-bar { padding: 20px 24px; }
      .auth-form { padding: 24px; }
      .auth-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="logo" aria-label="klarbill">
      <svg viewBox="0 0 180.52 44.96" height="32" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true" style="display:block">
        <path fill="#0A0A0B" d="M0,1.12h4.99v29.08l15.62-17.85h6.3l-12.73,14.18,14.9,17.79h-6.17l-11.82-14.31-6.1,6.89v7.42H0V1.12Z"/>
        <path fill="#0A0A0B" d="M33.87,1.12h4.99v43.19h-4.99V1.12Z"/>
        <path fill="#0A0A0B" d="M45.95,28.36c0-9.39,6.24-16.67,15.1-16.67,5.12,0,9.65,2.1,12.01,6.24v-5.58h4.99v31.97h-4.99v-5.58c-2.36,4.2-6.89,6.24-12.01,6.24-8.86,0-15.1-7.35-15.1-16.61ZM73.06,28.36c0-6.7-4.79-11.82-10.9-11.82s-11.09,4.99-11.09,11.82,4.73,11.75,11.09,11.75,10.9-5.05,10.9-11.75Z"/>
        <path fill="#0A0A0B" d="M86.45,12.34h4.99v6.76c1.84-4.2,5.97-7.42,12.34-7.42v5.45c-7.48,0-12.34,4.2-12.34,12.01v15.16h-4.99V12.34Z"/>
        <path fill="#9e005d" d="M114.35,38.73v5.58h-4.79V1.12h4.99v16.8c2.36-4.13,6.96-6.24,12.01-6.24,8.86,0,15.1,7.29,15.1,16.67s-6.24,16.61-15.1,16.61c-5.19,0-9.85-2.03-12.21-6.24ZM136.54,28.36c0-6.83-4.73-11.82-11.09-11.82s-10.9,5.12-10.9,11.82,4.79,11.75,10.9,11.75,11.09-4.99,11.09-11.75Z"/>
        <circle fill="#9e005d" cx="151.24" cy="3.35" r="3.35"/><path fill="#9e005d" d="M148.75,12.34h4.99v31.97h-4.99V12.34Z"/>
        <path fill="#9e005d" d="M162.14,1.12h4.99v43.19h-4.99V1.12Z"/>
        <path fill="#9e005d" d="M175.53,1.12h4.99v43.19h-4.99V1.12Z"/>
      </svg>
    </a>
  </div>

  <main class="main">
    <div class="auth-card">

      <div class="auth-header">
        <h1>Konto erstellen</h1>
        <p>14 Tage kostenlos · Keine Kreditkarte</p>
      </div>

      <div class="auth-form">

        <button class="social-btn">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          </span>
          Mit Google fortfahren
        </button>

        <div class="divider">ODER</div>

        <div class="field">
          <label class="label" for="email">E-Mail</label>
          <input type="email" id="email" class="input" placeholder="dein@email.de">
        </div>

        <div class="field">
          <label class="label" for="password">Passwort</label>
          <input type="password" id="password" class="input" placeholder="Mindestens 8 Zeichen">
          <p class="pw-hint">Mindestens 8 Zeichen, ein Großbuchstabe und eine Zahl.</p>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="terms">
          <label for="terms">
            Ich akzeptiere die <a href="/agb.html">AGB</a> und die <a href="/datenschutz.html">Datenschutzerklärung</a>.
          </label>
        </div>

        <a href="/welcome.html" class="submit-btn" style="display:flex; align-items:center; justify-content:center; text-decoration:none;">Konto erstellen</a>

      </div>

      <div class="auth-footer">
        Bereits ein Konto? <a href="/login.html">Jetzt anmelden</a>
      </div>

      <div class="trust">
        <div class="trust-row">
          <div class="trust-item">🔒 SSL-verschlüsselt</div>
          <div class="trust-item">🇪🇺 DSGVO-konform</div>
          <div class="trust-item">🇩🇪 Server in EU</div>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
