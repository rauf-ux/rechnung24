<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bereit! — Rechnung24</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #FAFAFA; color: #0A0A0B; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    .top-bar { padding: 24px 32px; }
    .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: #0A0A0B; border-radius: 8px; color: white; text-align: center; line-height: 28px; font-weight: 700; font-size: 14px; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 480px; text-align: center; }

    .done-icon { width: 80px; height: 80px; background: #0A0A0B; border-radius: 20px; margin: 0 auto 32px; display: flex; align-items: center; justify-content: center; color: white; font-size: 36px; }

    h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 12px; }
    .subtitle { font-size: 16px; color: #525252; margin-bottom: 40px; line-height: 1.6; }

    .actions { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .action { display: flex; align-items: center; gap: 14px; padding: 16px; background: white; border: 1px solid #E5E5E5; border-radius: 12px; transition: all 0.15s; }
    .action:hover { border-color: #0A0A0B; }
    .action.primary { background: #0A0A0B; border-color: #0A0A0B; color: white; }
    .action-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .action-text { flex: 1; font-size: 14px; font-weight: 500; }
    .action-arrow { font-size: 16px; opacity: 0.5; }

    @media (max-width: 480px) {
      .top-bar { padding: 20px 24px; }
      h1 { font-size: 26px; }
      .done-icon { width: 64px; height: 64px; font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="logo">
      <span class="logo-icon">R</span>
      Rechnung24
    </a>
  </div>

  <main class="main">
    <div class="card">

      <div class="done-icon">✓</div>

      <h1>Alles bereit</h1>
      <p class="subtitle">Du kannst jetzt Rechnungen erstellen.</p>

      <div class="actions">
        <a href="/invoice-new.html" class="action primary">
          <div class="action-icon">+</div>
          <div class="action-text">Erste Rechnung erstellen</div>
          <div class="action-arrow">→</div>
        </a>
        <a href="/dashboard.html" class="action">
          <div class="action-icon">→</div>
          <div class="action-text">Zum Dashboard</div>
          <div class="action-arrow"></div>
        </a>
      </div>

    </div>
  </main>

</body>
</html>
