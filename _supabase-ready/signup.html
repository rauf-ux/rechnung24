<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrieren — Klarbill</title>
  <meta name="description" content="Erstelle dein kostenloses Klarbill-Konto. 14 Tage testen, keine Kreditkarte erforderlich.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #FAFAFA; color: #0A0A0B; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* Top bar - minimal */
    .top-bar { padding: 24px 32px; }
    .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: #0A0A0B; border-radius: 8px; color: white; text-align: center; line-height: 28px; font-weight: 700; font-size: 14px; }

    /* Main content - centered */
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 440px; }

    /* Card header */
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .auth-header p { font-size: 14px; color: #737373; }

    /* Card body */
    .auth-form { background: white; border: 1px solid #E5E5E5; border-radius: 16px; padding: 32px; }

    /* Social buttons */
    .social-btn { width: 100%; height: 44px; background: white; border: 1px solid #E5E5E5; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; color: #0A0A0B; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; font-family: inherit; }
    .social-btn:hover:not(:disabled) { border-color: #0A0A0B; }
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .social-btn .icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #A3A3A3; font-size: 12px; font-weight: 500; }
    .divider:before, .divider:after { content: ''; flex: 1; height: 1px; background: #E5E5E5; }

    /* Form */
    .field { margin-bottom: 16px; }
    .label { display: block; font-size: 13px; color: #525252; font-weight: 500; margin-bottom: 6px; }
    .input { width: 100%; height: 44px; background: white; border: 1px solid #E5E5E5; border-radius: 10px; padding: 0 14px; font-size: 14px; color: #0A0A0B; font-family: inherit; transition: all 0.15s; }
    .input:focus { outline: none; border-color: #0A0A0B; border-width: 1.5px; }
    .input::placeholder { color: #A3A3A3; }
    .input[aria-invalid="true"] { border-color: #DC2626; }
    .helper { font-size: 12px; color: #737373; margin-top: 6px; }

    /* Password requirements */
    .pw-hint { font-size: 12px; color: #737373; margin-top: 8px; line-height: 1.5; }

    /* Checkbox */
    .checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; }
    .checkbox-row input { margin-top: 3px; cursor: pointer; }
    .checkbox-row label { font-size: 13px; color: #525252; line-height: 1.5; cursor: pointer; }
    .checkbox-row a { color: #0A0A0B; text-decoration: underline; text-decoration-color: #C7C7C7; }

    /* Submit */
    .submit-btn { width: 100%; height: 48px; background: #0A0A0B; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover:not(:disabled) { background: #262626; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Spinner */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .social-btn .spinner { border-color: rgba(10,10,11,0.15); border-top-color: #0A0A0B; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alerts */
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; display: none; }
    .alert.is-visible { display: block; }
    .alert-error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .alert-success { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }

    /* Footer link */
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #737373; }
    .auth-footer a { color: #0A0A0B; font-weight: 500; }

    /* Trust badges */
    .trust { text-align: center; margin-top: 32px; font-size: 12px; color: #A3A3A3; line-height: 1.6; }
    .trust-row { display: flex; justify-content: center; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 4px; }

    /* Mobile */
    @media (max-width: 480px) {
      .top-bar { padding: 20px 24px; }
      .auth-form { padding: 24px; }
      .auth-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="logo" aria-label="klarbill">
      <svg viewBox="0 0 215.91 43.85" height="32" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true" style="display:block"><path fill="#0A0A0B" d="M0,.66h7.61v25.14s2.76-3.94,4.6-6.17L27.44.66h8.99l-15.69,19.89,17.33,22.65h-8.93l-13.19-17.4-8.34,10.04v7.35H0V.66Z"/><path fill="#0A0A0B" d="M42.54,0h7.29v43.19h-7.29V0Z"/><path fill="#0A0A0B" d="M56.06,26.98c0-9.39,6.1-16.94,15.03-16.94,4.4,0,8.27,1.77,10.83,4.79v-4.14h7.29v32.49h-7.29v-4.07c-2.56,3.02-6.43,4.73-10.83,4.73-8.93,0-15.03-7.55-15.03-16.87ZM81.92,26.98c0-5.71-3.81-9.91-8.99-9.91-5.51,0-9.45,4.2-9.45,9.91s3.94,9.85,9.45,9.85c5.12,0,8.99-4.07,8.99-9.85Z"/><path fill="#0A0A0B" d="M96.56,10.7h7.29v6.43c1.25-3.28,4.79-7.09,11.75-7.09v7.94c-7.15,0-11.75,3.41-11.75,11.95v13.26h-7.29V10.7Z"/><path fill="#9e005d" d="M121.64.66h19.82c7.02,0,12.74,3.28,12.74,10.77,0,3.35-2.1,6.43-4.46,7.61,4.86,1.05,8.47,5.38,8.47,10.9,0,8.73-6.63,13.26-16.15,13.26h-20.42V.66ZM141.07,16.74c3.28,0,5.19-1.77,5.19-4.66s-1.84-4.86-5.51-4.86h-11.49v9.52h11.82ZM141.53,36.63c5.32,0,8.73-2.17,8.73-6.56s-3.15-6.83-8.01-6.83h-13v13.39h12.28Z"/><path fill="#9e005d" d="M164.9,14.94h7.29v28.26h-7.29V14.94Z"/><path fill="#9e005d" d="M164.9,0h7.29v10.04h-7.29V0Z"/><path fill="#9e005d" d="M179.54,0h7.29v43.19h-7.29V0Z"/><path fill="#9e005d" d="M194.17,0h7.29v43.19h-7.29V0Z"/><path fill="#9e005d" d="M208.62,36.3h7.29v6.89h-7.29v-6.89Z"/></svg>
    </a>
  </div>

  <main class="main">
    <div class="auth-card">

      <div class="auth-header">
        <h1>Konto erstellen</h1>
        <p>14 Tage kostenlos · Keine Kreditkarte</p>
      </div>

      <div class="auth-form">

        <div id="alert" class="alert" role="alert" aria-live="polite"></div>

        <button id="googleBtn" class="social-btn" type="button">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          </span>
          <span class="btn-label">Mit Google fortfahren</span>
        </button>

        <div class="divider">ODER</div>

        <form id="signupForm" novalidate>
          <div class="field">
            <label class="label" for="email">E-Mail</label>
            <input type="email" id="email" name="email" autocomplete="email" inputmode="email" class="input" placeholder="dein@email.de" required>
          </div>

          <div class="field">
            <label class="label" for="password">Passwort</label>
            <input type="password" id="password" name="password" autocomplete="new-password" class="input" placeholder="Mindestens 8 Zeichen" required minlength="8">
            <p class="pw-hint">Mindestens 8 Zeichen, ein Großbuchstabe und eine Zahl.</p>
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="terms" required>
            <label for="terms">
              Ich akzeptiere die <a href="/agb.html">AGB</a> und die <a href="/datenschutz.html">Datenschutzerklärung</a>.
            </label>
          </div>

          <button type="submit" id="submitBtn" class="submit-btn">
            <span class="btn-label">Konto erstellen</span>
          </button>
        </form>

      </div>

      <div class="auth-footer">
        Bereits ein Konto? <a href="/login.html">Jetzt anmelden</a>
      </div>

      <div class="trust">
        <div class="trust-row">
          <div class="trust-item">🔒 SSL-verschlüsselt</div>
          <div class="trust-item">🇪🇺 DSGVO-konform</div>
          <div class="trust-item">🇩🇪 Server in EU</div>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase.js"></script>
  <script>
    (function () {
      const form     = document.getElementById('signupForm');
      const email    = document.getElementById('email');
      const password = document.getElementById('password');
      const terms    = document.getElementById('terms');
      const submit   = document.getElementById('submitBtn');
      const submitLb = submit.querySelector('.btn-label');
      const googleBtn = document.getElementById('googleBtn');
      const googleLb = googleBtn.querySelector('.btn-label');
      const alertEl  = document.getElementById('alert');

      function showAlert(kind, msg) {
        alertEl.className = 'alert alert-' + kind + ' is-visible';
        alertEl.textContent = msg;
      }
      function hideAlert() {
        alertEl.className = 'alert';
        alertEl.textContent = '';
      }
      function setBusy(btn, label, busy) {
        btn.disabled = busy;
        const lbEl = btn.querySelector('.btn-label');
        if (busy) {
          if (!btn.dataset.original) btn.dataset.original = lbEl.textContent;
          lbEl.textContent = label;
          if (!btn.querySelector('.spinner')) {
            const sp = document.createElement('span');
            sp.className = 'spinner';
            btn.insertBefore(sp, lbEl);
          }
        } else {
          if (btn.dataset.original) lbEl.textContent = btn.dataset.original;
          const sp = btn.querySelector('.spinner');
          if (sp) sp.remove();
        }
      }

      // Google OAuth
      googleBtn.addEventListener('click', async function () {
        hideAlert();
        setBusy(googleBtn, 'Weiterleitung…', true);
        try {
          await window.klarbillAuth.signInWithGoogle();
        } catch (err) {
          showAlert('error', window.klarbillAuth.friendlyError(err));
          setBusy(googleBtn, '', false);
        }
      });

      // Email signup
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideAlert();

        if (!window.klarbillAuth.isValidEmail(email.value)) {
          email.setAttribute('aria-invalid', 'true');
          showAlert('error', 'Bitte gib eine gültige E-Mail-Adresse ein.');
          return;
        }
        email.removeAttribute('aria-invalid');

        if (password.value.length < 8) {
          password.setAttribute('aria-invalid', 'true');
          showAlert('error', 'Passwort muss mindestens 8 Zeichen haben.');
          return;
        }
        password.removeAttribute('aria-invalid');

        if (!terms.checked) {
          showAlert('error', 'Bitte akzeptiere die AGB und Datenschutzerklärung.');
          return;
        }

        setBusy(submit, 'Konto wird erstellt…', true);
        try {
          await window.klarbillAuth.signUpWithEmail({
            email: email.value.trim(),
            password: password.value,
          });
          showAlert(
            'success',
            'Fast fertig! Wir haben dir eine Bestätigungs-E-Mail an ' + email.value.trim() + ' gesendet. Klicke den Link, um dein Konto zu aktivieren.'
          );
          form.reset();
          submit.disabled = true;
          submitLb.textContent = 'E-Mail gesendet ✓';
          const sp = submit.querySelector('.spinner');
          if (sp) sp.remove();
        } catch (err) {
          showAlert('error', window.klarbillAuth.friendlyError(err));
          setBusy(submit, '', false);
        }
      });
    })();
  </script>
</body>
</html>
